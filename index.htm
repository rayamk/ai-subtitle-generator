    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        /* ===== GLASS CARD ===== */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* ===== LOGO & HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 11px;
            color: #a8b5ff;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            padding: 8px 20px;
            margin-bottom: 32px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ===== UPLOAD AREA ===== */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .upload-hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
        }

        .upload-hint span {
            color: #667eea;
        }

        #fileInput {
            display: none;
        }

        /* ===== FILE INFO ===== */
        .file-info {
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 24px;
        }

        .file-info.show {
            display: flex;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            padding: 2px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
        }

        .file-remove {
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
            background: none;
            border: none;
        }

        .file-remove:hover {
            color: #f87171;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .option-group label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .option-group select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            appearance: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-group select:hover {
            border-color: rgba(102, 126, 234, 0.4);
        }

        .option-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .option-group select option {
            background: #1a1a2e;
        }

        /* Toggle Switch */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
            grid-column: span 2;
            justify-content: center;
            padding: 8px 0;
        }

        .toggle-group label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        .toggle {
            position: relative;
            width: 48px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .toggle.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle.active::after {
            left: 23px;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .loader {
            display: none;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .btn-submit.loading .loader {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ===== RESPONSE ===== */
        .response {
            display: none;
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .response.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .response.success {
            border-color: rgba(74, 222, 128, 0.3);
        }

        .response.error {
            border-color: rgba(248, 113, 113, 0.3);
        }

        .response-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .response-title .icon {
            margin-right: 8px;
        }

        .response-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            word-break: break-all;
        }

        .response-download {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            border: none;
            border-radius: 10px;
            color: #0f0c29;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .response-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74, 222, 128, 0.4);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo-text {
                font-size: 22px;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .toggle-group {
                grid-column: span 1;
            }

            .upload-area {
                padding: 30px 15px;
            }

            .logo-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="logo-wrapper">
            <div class="logo-icon">🎬</div>
            <span class="logo-text">Subtitle Pro</span>
        </div>
        <div class="subtitle">AI-Powered Transcription & Translation</div>
        <div class="badge">⚡ v2.0.0</div>
    </div>

    <!-- ===== STATUS ===== -->
    <div class="status-bar">
        <span class="status-dot"></span>
        <span id="statusText">System Online</span>
        <span style="opacity:0.3; margin: 0 8px;">|</span>
        <span id="modelStatus">Whisper Tiny</span>
    </div>

    <!-- ===== UPLOAD ===== -->
    <div class="upload-area" id="dropArea">
        <span class="upload-icon">📤</span>
        <div class="upload-text">Drop your video here</div>
        <div class="upload-hint">or <span>click to browse</span> · MP4, AVI, MOV, MKV</div>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <!-- ===== FILE INFO ===== -->
    <div class="file-info" id="fileInfo">
        <span style="font-size:20px;">📹</span>
        <span class="file-name" id="fileName">video.mp4</span>
        <span class="file-size" id="fileSize">0 MB</span>
        <button class="file-remove" id="fileRemove">✕</button>
    </div>

    <!-- ===== OPTIONS ===== -->
    <div class="options">
        <div class="option-group">
            <label>🎯 Source Language</label>
            <select id="sourceLang">
                <option value="auto">Auto Detect</option>
                <option value="english">English</option>
                <option value="chinese">Chinese</option>
                <option value="japanese">Japanese</option>
                <option value="korean">Korean</option>
                <option value="thai">Thai</option>
                <option value="vietnamese">Vietnamese</option>
            </select>
        </div>
        <div class="option-group">
            <label>🌍 Target Language</label>
            <select id="targetLang">
                <option value="myanmar">🇲🇲 Myanmar</option>
                <option value="english">🇬🇧 English</option>
                <option value="chinese">🇨🇳 Chinese</option>
                <option value="japanese">🇯🇵 Japanese</option>
                <option value="korean">🇰🇷 Korean</option>
                <option value="thai">🇹🇭 Thai</option>
            </select>
        </div>
        <div class="toggle-group">
            <label>🔁 Translate</label>
            <div class="toggle active" id="toggleTranslate"></div>
            <label style="color:rgba(255,255,255,0.3);">ON</label>
        </div>
    </div>

    <!-- ===== SUBMIT ===== -->
    <button class="btn-submit" id="submitBtn">
        <span class="btn-text">🚀 Generate Subtitles</span>
        <span class="loader">⏳</span>
    </button>

    <!-- ===== RESPONSE ===== -->
    <div class="response" id="response">
        <div class="response-title"><span class="icon">✅</span> <span id="responseTitle">Success</span></div>
        <div class="response-text" id="responseText">Your subtitles are ready!</div>
        <a class="response-download" id="downloadLink" href="#" download>📥 Download SRT</a>
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <span>AI Subtitle Generator Pro</span> · 
        <a href="/docs" target="_blank">API Docs</a> · 
        <a href="/api/status" target="_blank">Status</a>
    </div>
</div>

<script>
    // ===== DOM ELEMENTS =====
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const submitBtn = document.getElementById('submitBtn');
    const response = document.getElementById('response');
    const responseTitle = document.getElementById('responseTitle');
    const responseText = document.getElementById('responseText');
    const downloadLink = document.getElementById('downloadLink');
    const toggleTranslate = document.getElementById('toggleTranslate');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const statusText = document.getElementById('statusText');

    let selectedFile = null;

    // ===== STATUS =====
    async function checkStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            if (data.status === 'online') {
                statusText.textContent = '🟢 System Online';
            }
        } catch (e) {
            statusText.textContent = '🔴 Offline';
        }
    }
    checkStatus();
    setInterval(checkStatus, 30000);

    // ===== TOGGLE =====
    toggleTranslate.addEventListener('click', function() {
        this.classList.toggle('active');
        const label = this.parentElement.querySelector('label:last-child');
        label.textContent = this.classList.contains('active') ? 'ON' : 'OFF';
        label.style.color = this.classList.contains('active') ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.6)';
    });

    // ===== UPLOAD =====
    dropArea.addEventListener('click', () => fileInput.click());

    dropArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropArea.classList.add('dragover');
    });

    dropArea.addEventListener('dragleave', () => {
        dropArea.classList.remove('dragover');
    });

    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        const validTypes = ['video/mp4', 'video/avi', 'video/quicktime', 'video/x-matroska', 'video/webm', 'video/x-flv'];
        if (!validTypes.includes(file.type) && !file.name.match(/\.(mp4|avi|mov|mkv|webm|flv|wmv)$/i)) {
            showResponse(false, 'Unsupported File', 'Please upload a valid video file (MP4, AVI, MOV, MKV, WEBM, FLV, WMV)');
            return;
        }
        if (file.size > 500 * 1024 * 1024) {
            showResponse(false, 'File Too Large', 'Maximum file size is 500MB');
            return;
        }
        selectedFile = file;
