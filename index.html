<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI Subtitle Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 <span>AI Subtitle Generator</span></h1>
            <p>Professional Transcription & Translation Powered by AI</p>
        </header>
        
        <main>
            <div class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <p>📤 Drop your video here</p>
                    <p class="small">or click to browse</p>
                    <input type="file" accept="video/*" id="videoInput">
                </div>
                
                <div class="settings">
                    <div class="form-group">
                        <label>🎯 Source Language</label>
                        <select id="sourceLang">
                            <option value="auto">Auto Detect</option>
                            <option value="english">English</option>
                            <option value="myanmar">Myanmar</option>
                            <option value="thai">Thai</option>
                            <option value="vietnamese">Vietnamese</option>
                            <option value="chinese">Chinese</option>
                            <option value="japanese">Japanese</option>
                            <option value="korean">Korean</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>🌏 Target Language</label>
                        <select id="targetLang">
                            <option value="myanmar">Myanmar</option>
                            <option value="english">English</option>
                            <option value="thai">Thai</option>
                            <option value="vietnamese">Vietnamese</option>
                            <option value="chinese">Chinese</option>
                            <option value="japanese">Japanese</option>
                            <option value="korean">Korean</option>
                        </select>
                    </div>
                </div>
                
                <button id="generateBtn">⚡ Generate Subtitles</button>
            </div>
            
            <div class="output-section">
                <div class="preview">
                    <h3>📝 Subtitle Preview</h3>
                    <div id="subtitlePreview"></div>
                </div>
                
                <div class="download">
                    <button id="downloadBtn">📥 Download SRT</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
