<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Generator Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 8px 0 24px;
        }
        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #a8b5ff;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            padding: 8px 20px;
            margin: 24px 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-icon { font-size: 48px; display: block; margin-bottom: 12px; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }
        .footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
        }
        .footer a:hover { color: rgba(255, 255, 255, 0.6); }
        #fileInput { display: none; }
        .file-info {
            display: none;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            align-items: center;
            gap: 12px;
        }
        .file-info.show { display: flex; }
        .file-name { flex: 1; font-size: 14px; color: rgba(255,255,255,0.8); }
        .file-remove { cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.3); background: none; border: none; }
        .file-remove:hover { color: #f87171; }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🎬</div>
    <h1>AI Subtitle Generator</h1>
    <div class="subtitle">AI-Powered Transcription & Translation</div>
    <div class="badge">⚡ v2.0.0</div>

    <div class="status">
        <span class="dot"></span>
        <span>System Online</span>
        <span style="opacity:0.3; margin:0 8px;">|</span>
        <span>Whisper Tiny</span>
    </div>

    <div class="upload-area" id="dropArea">
        <span class="upload-icon">📤</span>
        <div>Drop your video here</div>
        <div style="font-size:13px; color:rgba(255,255,255,0.4); margin-top:8px;">
            or <span style="color:#667eea;">click to browse</span> · MP4, AVI, MOV, MKV
        </div>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="file-info" id="fileInfo">
        <span style="font-size:20px;">📹</span>
        <span class="file-name" id="fileName">video.mp4</span>
        <button class="file-remove" id="fileRemove">✕</button>
    </div>

    <button class="btn" id="submitBtn">🚀 Generate Subtitles</button>

    <div class="footer">
        <a href="/docs" target="_blank">API Docs</a> · 
        <a href="/api/status" target="_blank">Status</a>
    </div>
</div>

<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileRemove = document.getElementById('fileRemove');
const submitBtn = document.getElementById('submitBtn');

let selectedFile = null;

dropArea.addEventListener('click', () => fileInput.click());
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.borderColor = '#667eea'; });
dropArea.addEventListener('dragleave', () => { dropArea.style.borderColor = 'rgba(255,255,255,0.15)'; });
dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.style.borderColor = 'rgba(255,255,255,0.15)';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
    selectedFile = file;
    fileName.textContent = file.name;
    fileInfo.classList.add('show');
}

fileRemove.addEventListener('click', () => {
    selectedFile = null;
    fileInfo.classList.remove('show');
    fileInput.value = '';
});

submitBtn.addEventListener('click', async function() {
    if (!selectedFile) { alert('Please select a video file first!'); return; }
    const formData = new FormData();
    formData.append('video', selectedFile);
    formData.append('translate', 'true');
    formData.append('target_language', 'myanmar');
    formData.append('source_language', 'auto');

    this.textContent = '⏳ Processing...';
    this.disabled = true;

    try {
        const res = await fetch('/api/transcribe', { method: 'POST', body: formData });
        if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'subtitles.srt';
            a.click();
            alert('✅ Subtitles generated successfully!');
        } else {
            const error = await res.json();
            alert('❌ Error: ' + (error.detail || 'Something went wrong'));
        }
    } catch (e) {
        alert('❌ Error: ' + e.message);
    }
    this.textContent = '🚀 Generate Subtitles';
    this.disabled = false;
});
</script>
</body>
</html>
